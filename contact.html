<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Jess McArthur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- NAV -->
    <nav>
        <div class="nav-logo"><a href="index.html">JESSMCARTHUR</a></div>
        <div class="nav-links">
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <!-- MAIN: CTA + FORM -->
    <div class="contact-grid" style="margin-bottom: var(--gap);">

        <!-- LEFT: CTA card -->
        <div class="contact-cta-card">
            <div class="contact-cta-tag">Get in touch</div>
            <div class="contact-cta-text">Let's create something together</div>
            <p class="contact-cta-sub">If you feel like I'm the right fit for your team, I'd love to hear from you.</p>
        </div>

        <!-- RIGHT: Form card -->
        <div class="contact-form-card">
            <div class="contact-form-tag">Send a message</div>

            <form class="contact-form" action="#" method="POST">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input class="form-input" type="text" id="name" name="name" placeholder="" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" type="email" id="email" name="email" placeholder="" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea class="form-textarea" id="message" name="message" rows="5"></textarea>
                </div>

                <button class="form-submit" type="submit">Submit</button>

            </form>
        </div>

    </div>

    <!-- FOOTER INFO BAR -->
    <div class="contact-footer">

        <div class="contact-footer-col">
            <div class="contact-footer-label">Email</div>
            <a href="mailto:jessmcarthur6@gmail.com"
                class="contact-footer-val contact-footer-link">jessmcarthur6@gmail.com</a>
        </div>

        <div class="contact-footer-col">
            <div class="contact-footer-label">Location</div>
            <div class="contact-footer-val">Auckland, New Zealand</div>
        </div>

        <div class="contact-footer-col">
            <div class="contact-footer-label">Socials</div>
            <div class="contact-footer-socials">
                <a href="https://www.linkedin.com/in/jess-mcarthur-79a7a12aa" target="_blank"
                    class="social-pill">LinkedIn <span>↗</span></a>
                <a href="https://www.instagram.com/jessmcarthur.design/" target="_blank" class="social-pill">Instagram
                    <span>↗</span></a>
            </div>
        </div>

    </div>

</body>

</html>
